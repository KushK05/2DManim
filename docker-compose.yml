services:
  postgres:
    image: postgres:16
    container_name: 2dmanim-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: 2dmanim
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: 2dmanim-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  minio:
    image: minio/minio:latest
    container_name: 2dmanim-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: ["server", "/data", "--console-address", ":9001"]

  minio-create-bucket:
    image: minio/mc:latest
    container_name: 2dmanim-minio-create-bucket
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done
        mc mb -p local/2dmanim-videos || true
        mc anonymous set download local/2dmanim-videos || true

  app:
    build: .
    container_name: 2dmanim-app
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/2dmanim
      REDIS_URL: redis://redis:6379
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_BASE_URL: http://localhost:9000/2dmanim-videos
    depends_on:
      - postgres
      - redis
      - minio-create-bucket
    volumes:
      - ./.data:/app/.data
      - ./public/generated:/app/public/generated

  worker:
    build: .
    container_name: 2dmanim-worker
    command: ["npm", "run", "worker:start"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/2dmanim
      REDIS_URL: redis://redis:6379
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_BASE_URL: http://localhost:9000/2dmanim-videos
    depends_on:
      - postgres
      - redis
      - minio-create-bucket
    volumes:
      - ./public/generated:/app/public/generated
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres-data:
  redis-data:
  minio-data:
